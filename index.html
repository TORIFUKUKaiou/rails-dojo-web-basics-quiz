<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rails Dojo Web Basics Quiz</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="space" aria-hidden="true">
      <span class="star star-a"></span>
      <span class="star star-b"></span>
      <span class="star star-c"></span>
      <span class="shooting shooting-a"></span>
      <span class="shooting shooting-b"></span>
      <span class="shooting shooting-c"></span>
    </div>

    <main class="app">
      <header class="hero">
        <p class="eyebrow">Year 1 / Week 10</p>
        <h1>Webの仕組み クイズ</h1>
        <p class="lead">
          ブラウザ、サーバ、リクエスト、レスポンス、GET / POST、フォーム、ルーティングを選択式で確認します。
        </p>
      </header>

      <section class="status-panel" aria-label="進捗">
        <div>
          <span class="status-label">進捗</span>
          <strong id="progressText">1 / 54</strong>
        </div>
        <div>
          <span class="status-label">正解</span>
          <strong id="scoreText">0</strong>
        </div>
        <div>
          <span class="status-label">分野</span>
          <strong id="categoryText">ブラウザとサーバ</strong>
        </div>
      </section>

      <section class="quiz-card" id="quizCard" aria-live="polite">
        <div class="question-head">
          <span class="question-number" id="questionNumber">Q1</span>
          <span class="question-type" id="questionType">1つ選択</span>
        </div>
        <h2 id="questionText"></h2>
        <pre class="code-block" id="codeBlock" hidden></pre>
        <div class="choices" id="choices"></div>
        <p class="message" id="message" role="status"></p>
        <div class="result" id="result" hidden>
          <p class="result-title" id="resultTitle"></p>
          <p id="answerText"></p>
          <p id="explanationText"></p>
        </div>
        <div class="actions">
          <button class="secondary" id="resetButton" type="button">最初から</button>
          <button class="primary" id="submitButton" type="button">submit</button>
          <button class="primary" id="nextButton" type="button" hidden>次へ</button>
        </div>
      </section>

      <section class="finish-card" id="finishCard" hidden>
        <p class="eyebrow">Result</p>
        <h2 id="finishTitle"></h2>
        <p id="finishLead"></p>
        <div class="review-list" id="reviewList"></div>
        <button class="primary" id="retryButton" type="button">もう一度</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
